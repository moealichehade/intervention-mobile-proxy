<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Intervention — Counselor View</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
/* ── Reset ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 15px; -webkit-text-size-adjust: 100%; }
body {
  font-family: 'DM Sans', sans-serif;
  background: #F7F4EF;
  color: #1A1A2E;
  min-height: 100vh;
  padding-bottom: 80px;
}

/* ── Variables ── */
:root {
  --blue:    #274C77;
  --orange:  #E38B2C;
  --lavender:#C4B5FD;
  --cream:   #F7F4EF;
  --white:   #FFFFFF;
  --border:  #E5E7EB;
  --muted:   #9898B0;
  --text:    #1A1A2E;
  --text2:   #5C5C7A;
  --green:   #22C55E;
  --red:     #EF4444;
  --shadow:  0 2px 12px rgba(0,0,0,0.08);
}

/* ── Header ── */
.app-header {
  background: var(--white);
  border-bottom: 1px solid var(--border);
  padding: 16px 20px 12px;
  position: sticky;
  top: 0;
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.header-brand {
  display: flex;
  align-items: center;
  gap: 10px;
}

.header-logo {
  width: 36px;
  height: 36px;
  background: linear-gradient(135deg, var(--blue), var(--lavender));
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'DM Serif Display', serif;
  color: white;
  font-size: 16px;
}

.header-title {
  font-family: 'DM Serif Display', serif;
  font-size: 18px;
  color: var(--text);
}

.header-sub {
  font-size: 11px;
  color: var(--muted);
}

.sync-btn {
  width: 36px;
  height: 36px;
  border-radius: 10px;
  border: 1.5px solid var(--border);
  background: var(--cream);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  color: var(--text2);
  font-size: 16px;
  transition: all 0.2s;
}
.sync-btn:active { background: var(--orange); color: white; border-color: var(--orange); }
.sync-btn.spinning { animation: spin 1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Bottom Nav ── */
.bottom-nav {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: var(--white);
  border-top: 1px solid var(--border);
  display: flex;
  padding: 8px 0 max(8px, env(safe-area-inset-bottom));
  z-index: 100;
}

.nav-tab {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  padding: 6px 0;
  cursor: pointer;
  border: none;
  background: none;
  font-family: 'DM Sans', sans-serif;
  transition: all 0.2s;
}

.nav-tab-icon {
  font-size: 20px;
  line-height: 1;
}

.nav-tab-label {
  font-size: 10px;
  font-weight: 500;
  color: var(--muted);
}

.nav-tab.active .nav-tab-label { color: var(--orange); }
.nav-tab.active .nav-tab-icon { filter: none; }

/* ── Pages ── */
.page { display: none; padding: 16px; }
.page.active { display: block; }

/* ── Stat Cards ── */
.stats-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 20px;
}

.stat-card {
  background: var(--white);
  border-radius: 14px;
  padding: 14px;
  border: 1px solid var(--border);
  box-shadow: var(--shadow);
}

.stat-number {
  font-family: 'DM Serif Display', serif;
  font-size: 28px;
  color: var(--text);
  line-height: 1;
  margin-bottom: 2px;
}

.stat-label {
  font-size: 11px;
  color: var(--text2);
}

.stat-card.orange { border-left: 3px solid var(--orange); }
.stat-card.blue   { border-left: 3px solid var(--blue); }
.stat-card.green  { border-left: 3px solid var(--green); }
.stat-card.lavender { border-left: 3px solid var(--lavender); }

/* ── Section header ── */
.section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}

.section-title {
  font-size: 13px;
  font-weight: 700;
  color: var(--text2);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  display: flex;
  align-items: center;
  gap: 6px;
}

.section-title::before {
  content: '';
  width: 3px;
  height: 13px;
  background: var(--orange);
  border-radius: 2px;
  display: inline-block;
}

.section-count {
  font-size: 11px;
  color: var(--muted);
  background: var(--cream);
  padding: 2px 8px;
  border-radius: 10px;
  border: 1px solid var(--border);
}

/* ── Student Cards ── */
.student-card {
  background: var(--white);
  border-radius: 14px;
  padding: 14px 16px;
  margin-bottom: 10px;
  border: 1px solid var(--border);
  box-shadow: var(--shadow);
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 12px;
}

.student-card:active { transform: scale(0.98); background: #FAFAFA; }

.student-avatar {
  width: 44px;
  height: 44px;
  border-radius: 12px;
  background: linear-gradient(135deg, var(--blue), var(--lavender));
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'DM Serif Display', serif;
  font-size: 16px;
  color: white;
  flex-shrink: 0;
}

.student-info { flex: 1; min-width: 0; }

.student-name {
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.student-code {
  font-size: 11px;
  color: var(--muted);
  margin-bottom: 4px;
}

.student-tags {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
}

.tag {
  font-size: 10px;
  font-weight: 600;
  padding: 2px 7px;
  border-radius: 20px;
}

.tag-active   { background: #DCFCE7; color: #166534; }
.tag-monitor  { background: #FEF3C7; color: #92400E; }
.tag-complete { background: #E0E7FF; color: #3730A3; }
.tag-followup { background: #FEE2E2; color: #991B1B; }
.tag-program  { background: #EBF4FF; color: #274C77; }

.student-sessions {
  font-size: 11px;
  color: var(--muted);
  flex-shrink: 0;
  text-align: right;
}

.student-sessions strong {
  display: block;
  font-size: 16px;
  font-family: 'DM Serif Display', serif;
  color: var(--text);
}

/* ── Detail View ── */
.detail-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 20px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--border);
}

.back-btn {
  width: 36px;
  height: 36px;
  border-radius: 10px;
  border: 1.5px solid var(--border);
  background: var(--white);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-size: 18px;
  color: var(--text2);
  flex-shrink: 0;
}

.detail-avatar {
  width: 52px;
  height: 52px;
  border-radius: 14px;
  background: linear-gradient(135deg, var(--blue), var(--lavender));
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'DM Serif Display', serif;
  font-size: 20px;
  color: white;
  flex-shrink: 0;
}

.detail-name {
  font-family: 'DM Serif Display', serif;
  font-size: 20px;
  color: var(--text);
}

.detail-sub { font-size: 12px; color: var(--muted); }

/* Info grid */
.info-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-bottom: 20px;
}

.info-chip {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px 12px;
}

.info-chip-label {
  font-size: 9px;
  font-weight: 700;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-bottom: 3px;
}

.info-chip-value {
  font-size: 12.5px;
  color: var(--text);
  font-weight: 500;
  line-height: 1.3;
}

/* Session items */
.session-item {
  background: var(--white);
  border-radius: 12px;
  padding: 12px 14px;
  margin-bottom: 8px;
  border: 1px solid var(--border);
  border-left: 3px solid var(--blue);
}

.session-item-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 4px;
}

.session-item-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
}

.session-item-date {
  font-size: 11px;
  color: var(--muted);
}

.session-item-detail {
  font-size: 11.5px;
  color: var(--text2);
  line-height: 1.4;
}

/* Goal items */
.goal-item {
  background: var(--white);
  border-radius: 12px;
  padding: 12px 14px;
  margin-bottom: 8px;
  border: 1px solid var(--border);
  border-left: 3px solid var(--lavender);
}

/* Practice items */
.practice-item {
  background: var(--white);
  border-radius: 12px;
  padding: 12px 14px;
  margin-bottom: 8px;
  border: 1px solid var(--border);
  border-left: 3px solid var(--orange);
}

/* Empty state */
.empty {
  text-align: center;
  padding: 24px;
  color: var(--muted);
  font-size: 13px;
}

/* Search bar */
.search-wrap {
  position: relative;
  margin-bottom: 16px;
}

.search-input {
  width: 100%;
  background: var(--white);
  border: 1.5px solid var(--border);
  border-radius: 12px;
  padding: 11px 16px 11px 40px;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  color: var(--text);
  outline: none;
}
.search-input:focus { border-color: var(--orange); }
.search-icon {
  position: absolute;
  left: 14px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--muted);
  font-size: 15px;
}

/* Filter pills */
.filter-pills {
  display: flex;
  gap: 6px;
  overflow-x: auto;
  padding-bottom: 4px;
  margin-bottom: 14px;
  scrollbar-width: none;
}
.filter-pills::-webkit-scrollbar { display: none; }

.filter-pill {
  white-space: nowrap;
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 600;
  border: 1.5px solid var(--border);
  background: var(--white);
  color: var(--text2);
  cursor: pointer;
  transition: all 0.2s;
}
.filter-pill.active {
  background: var(--orange);
  border-color: var(--orange);
  color: white;
}

/* Reminder items */
.reminder-item {
  background: var(--white);
  border-radius: 12px;
  padding: 12px 14px;
  margin-bottom: 8px;
  border: 1px solid var(--border);
  display: flex;
  align-items: flex-start;
  gap: 10px;
}

.rem-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  margin-top: 5px;
  flex-shrink: 0;
}

.rem-text {
  font-size: 13px;
  color: var(--text);
  line-height: 1.4;
  flex: 1;
}

.rem-meta {
  font-size: 11px;
  color: var(--muted);
  margin-top: 2px;
}

.rem-done { opacity: 0.5; }
.rem-done .rem-text { text-decoration: line-through; }

/* Loading */
.loading {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px;
  gap: 8px;
  color: var(--muted);
  font-size: 13px;
}

.spinner {
  width: 18px;
  height: 18px;
  border: 2px solid var(--border);
  border-top-color: var(--orange);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

/* Connection banner */
.conn-banner {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 12px 14px;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 12px;
}

.conn-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.conn-dot.ok    { background: var(--green); }
.conn-dot.error { background: var(--red); }
.conn-dot.loading { background: var(--orange); animation: pulse 1.5s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

.conn-text { color: var(--text2); }
.conn-text strong { color: var(--text); display: block; font-size: 12.5px; }

/* Progress bar */
.progress-bar {
  height: 4px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
  margin-top: 6px;
}

.progress-fill {
  height: 100%;
  border-radius: 2px;
  background: var(--orange);
  transition: width 0.5s ease;
}

/* Follow-up badge */
.followup-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  background: #FEE2E2;
  color: #991B1B;
  font-size: 10px;
  font-weight: 600;
  padding: 2px 7px;
  border-radius: 20px;
}

</style>
</head>
<body>

<!-- HEADER -->
<div class="app-header">
  <div class="header-brand">
    <div class="header-logo">I</div>
    <div>
      <div class="header-title">Intervention</div>
      <div class="header-sub">Counselor View</div>
    </div>
  </div>
  <button class="sync-btn" id="syncBtn" onclick="loadAllData()" title="Refresh">↻</button>
</div>

<!-- PAGES -->

<!-- HOME PAGE -->
<div class="page active" id="page-home">
  <div id="connBanner" class="conn-banner">
    <div class="conn-dot loading" id="connDot"></div>
    <div class="conn-text">
      <strong id="connTitle">Connecting…</strong>
      <span id="connSub">Loading your data</span>
    </div>
  </div>

  <div class="stats-row">
    <div class="stat-card orange">
      <div class="stat-number" id="homeActive">—</div>
      <div class="stat-label">Active Students</div>
    </div>
    <div class="stat-card red" style="border-left-color:#EF4444">
      <div class="stat-number" id="homeFollowup">—</div>
      <div class="stat-label">Follow-Up Needed</div>
    </div>
    <div class="stat-card blue">
      <div class="stat-number" id="homeSessions">—</div>
      <div class="stat-label">Total Sessions</div>
    </div>
    <div class="stat-card lavender">
      <div class="stat-number" id="homeTotal">—</div>
      <div class="stat-label">All Students</div>
    </div>
  </div>

  <!-- Follow-Up Needed -->
  <div class="section-header">
    <div class="section-title">Follow-Up Needed</div>
    <div class="section-count" id="followupCount">0</div>
  </div>
  <div id="followupList"><div class="loading"><div class="spinner"></div> Loading…</div></div>

  <!-- Recent Sessions -->
  <div class="section-header" style="margin-top:20px">
    <div class="section-title">Recent Sessions</div>
    <div class="section-count" id="recentCount">0</div>
  </div>
  <div id="recentSessionsList"><div class="loading"><div class="spinner"></div> Loading…</div></div>
</div>

<!-- STUDENTS PAGE -->
<div class="page" id="page-students">
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input class="search-input" id="studentSearch" placeholder="Search students…" oninput="renderStudentList()">
  </div>
  <div class="filter-pills" id="filterPills">
    <button class="filter-pill active" onclick="setStudentFilter('all',this)">All</button>
    <button class="filter-pill" onclick="setStudentFilter('active',this)">Active</button>
    <button class="filter-pill" onclick="setStudentFilter('monitoring',this)">Monitoring</button>
    <button class="filter-pill" onclick="setStudentFilter('completed',this)">Completed</button>
    <button class="filter-pill" onclick="setStudentFilter('followup',this)">Follow-Up</button>
  </div>
  <div id="studentList"><div class="loading"><div class="spinner"></div> Loading…</div></div>
</div>

<!-- STUDENT DETAIL PAGE -->
<div class="page" id="page-detail">
  <div id="detailContent"></div>
</div>

<!-- REMINDERS PAGE -->
<div class="page" id="page-reminders">
  <div class="filter-pills">
    <button class="filter-pill active" onclick="setRemTab('pending',this)">Pending</button>
    <button class="filter-pill" onclick="setRemTab('today',this)">Today</button>
    <button class="filter-pill" onclick="setRemTab('done',this)">Done</button>
    <button class="filter-pill" onclick="setRemTab('all',this)">All</button>
  </div>
  <div id="remindersList"><div class="loading"><div class="spinner"></div> Loading…</div></div>
</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <button class="nav-tab active" onclick="showPage('home',this)">
    <span class="nav-tab-icon">🏠</span>
    <span class="nav-tab-label">Home</span>
  </button>
  <button class="nav-tab" onclick="showPage('students',this)">
    <span class="nav-tab-icon">👥</span>
    <span class="nav-tab-label">Students</span>
  </button>
  <button class="nav-tab" onclick="showPage('reminders',this)">
    <span class="nav-tab-icon">🔔</span>
    <span class="nav-tab-label">Reminders</span>
  </button>
</nav>

<script>
// ── CONFIG ──────────────────────────────────────────────────
const PROXY = 'https://intervention-proxy-production.up.railway.app/notion';
const DB = {
  students:  '4beb5d836b1541dd9c9e81cd4475b0fe',
  sessions:  'a00786394be847a18c584bfb6d6becb8',
  goals:     'f4245027bd11476c8761c4359a09d8e7',
  practices: '35f40afc99c9405885d2f6080ba62823',
  reminders: 'cb872f7634c94dd1928b850a6849f217',
};

// ── STATE ────────────────────────────────────────────────────
const state = {
  students:  [],
  sessions:  [],
  goals:     [],
  practices: [],
  reminders: [],
  studentFilter: 'all',
  remTab: 'pending',
  connected: false,
};

// ── INIT ─────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => loadAllData());

async function loadAllData() {
  const btn = document.getElementById('syncBtn');
  btn.classList.add('spinning');
  setConn('loading', 'Connecting…', 'Fetching from Notion');

  try {
    await Promise.all([
      fetchStudents(),
      fetchSessions(),
      fetchGoals(),
      fetchPractices(),
      fetchReminders(),
    ]);
    state.connected = true;
    setConn('ok', 'Connected ✓', `${state.students.length} students loaded`);
    renderHome();
    renderStudentList();
    renderReminders();
  } catch(e) {
    setConn('error', 'Connection Failed', e.message.slice(0,60));
  }
  btn.classList.remove('spinning');
}

// ── FETCH FUNCTIONS ──────────────────────────────────────────
async function fetchDB(dbId) {
  const resp = await fetch(`${PROXY}/databases/${dbId}/query`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ page_size: 100 })
  });
  if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
  return resp.json();
}

async function fetchStudents() {
  const d = await fetchDB(DB.students);
  state.students = (d.results || []).map(p => {
    const pp = p.properties;
    const txt = x => x?.title?.[0]?.plain_text || x?.rich_text?.[0]?.plain_text || '';
    const sel = x => x?.select?.name || '';
    return {
      id:       p.id,
      name:     txt(pp['Student Name']),
      code:     txt(pp['Student Code']),
      grade:    sel(pp['Grade']),
      program:  txt(pp['Program']),
      focus:    txt(pp['Main Focus']),
      status:   sel(pp['Status']) || 'Active',
      followup: pp['Follow-Up Needed']?.checkbox || false,
      notes:    txt(pp['Notes']),
      counselor:txt(pp['Counselor']),
    };
  });
}

async function fetchSessions() {
  const d = await fetchDB(DB.sessions);
  state.sessions = (d.results || []).map(p => {
    const pp = p.properties;
    const txt = x => x?.title?.[0]?.plain_text || x?.rich_text?.[0]?.plain_text || '';
    const sel = x => x?.select?.name || '';
    const dt  = x => x?.date?.start ? new Date(x.date.start).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) : '';
    const rel = x => x?.relation?.[0]?.id || '';
    return {
      id:           p.id,
      title:        txt(pp['Session Title']),
      studentId:    rel(pp['Student']),
      focus:        txt(pp['Main Focus']),
      intervention: txt(pp['Intervention Used']),
      reflection:   txt(pp['Counselor Reflection']),
      next:         txt(pp['Next Step']),
      date:         dt(pp['Session Date']),
      followup:     pp['Follow-Up Needed']?.checkbox || false,
    };
  }).sort((a,b) => b.date.localeCompare(a.date));
}

async function fetchGoals() {
  const d = await fetchDB(DB.goals);
  state.goals = (d.results || []).map(p => {
    const pp = p.properties;
    const txt = x => x?.title?.[0]?.plain_text || x?.rich_text?.[0]?.plain_text || '';
    const sel = x => x?.select?.name || '';
    const rel = x => x?.relation?.[0]?.id || '';
    return {
      id:       p.id,
      title:    txt(pp['Goal Title']),
      studentId:rel(pp['Student']),
      type:     txt(pp['Goal Type']),
      progress: sel(pp['Progress Level']),
      status:   sel(pp['Status']),
      notes:    txt(pp['Notes']),
    };
  });
}

async function fetchPractices() {
  const d = await fetchDB(DB.practices);
  state.practices = (d.results || []).map(p => {
    const pp = p.properties;
    const txt = x => x?.title?.[0]?.plain_text || x?.rich_text?.[0]?.plain_text || '';
    const rel = x => x?.relation?.[0]?.id || '';
    return {
      id:        p.id,
      name:      txt(pp['Practice Name']),
      studentId: rel(pp['Student']),
      type:      txt(pp['Practice Type']),
      frequency: txt(pp['Frequency']),
      status:    txt(pp['Completion Status']),
      notes:     txt(pp['Reflection Notes']),
    };
  });
}

async function fetchReminders() {
  const d = await fetchDB(DB.reminders);
  state.reminders = (d.results || []).map(p => {
    const pp = p.properties;
    const txt = x => x?.title?.[0]?.plain_text || x?.rich_text?.[0]?.plain_text || '';
    const sel = x => x?.select?.name || '';
    const dt  = x => x?.date?.start || '';
    return {
      id:       p.id,
      text:     txt(pp['Reminder']),
      type:     sel(pp['Type']),
      student:  txt(pp['Student Code']),
      dueDate:  dt(pp['Due Date']),
      priority: sel(pp['Priority']),
      done:     pp['Done']?.checkbox || false,
    };
  });
}

// ── RENDER HOME ──────────────────────────────────────────────
function renderHome() {
  const active   = state.students.filter(s => s.status === 'Active').length;
  const followup = state.students.filter(s => s.followup).length;
  const total    = state.students.length;

  document.getElementById('homeActive').textContent   = active;
  document.getElementById('homeFollowup').textContent = followup;
  document.getElementById('homeSessions').textContent = state.sessions.length;
  document.getElementById('homeTotal').textContent    = total;
  document.getElementById('followupCount').textContent = followup;
  document.getElementById('recentCount').textContent  = Math.min(5, state.sessions.length);

  // Follow-up list
  const fuList = state.students.filter(s => s.followup).slice(0,5);
  const fuEl = document.getElementById('followupList');
  if (fuList.length === 0) {
    fuEl.innerHTML = '<div class="empty">No follow-ups needed ✓</div>';
  } else {
    fuEl.innerHTML = fuList.map(s => studentCardHTML(s)).join('');
  }

  // Recent sessions
  const recentEl = document.getElementById('recentSessionsList');
  const recent = state.sessions.slice(0,5);
  if (recent.length === 0) {
    recentEl.innerHTML = '<div class="empty">No sessions recorded yet</div>';
  } else {
    recentEl.innerHTML = recent.map(sess => {
      const student = state.students.find(s => s.id === sess.studentId);
      return `<div class="session-item" onclick="openStudent('${sess.studentId}')">
        <div class="session-item-header">
          <span class="session-item-title">${esc(sess.title || 'Session')}</span>
          <span class="session-item-date">${sess.date || '—'}</span>
        </div>
        <div class="session-item-detail">
          ${student ? `<strong>${esc(student.code)}</strong> · ` : ''}
          ${esc(sess.focus || '—')}
          ${sess.followup ? ' · <span style="color:#EF4444;font-weight:600">Follow-Up</span>' : ''}
        </div>
      </div>`;
    }).join('');
  }
}

// ── RENDER STUDENTS ──────────────────────────────────────────
let studentFilter = 'all';

function setStudentFilter(f, el) {
  studentFilter = f;
  document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  renderStudentList();
}

function renderStudentList() {
  const search = (document.getElementById('studentSearch')?.value || '').toLowerCase();
  let list = [...state.students];

  if (studentFilter === 'active')     list = list.filter(s => s.status === 'Active');
  if (studentFilter === 'monitoring') list = list.filter(s => s.status === 'Monitoring');
  if (studentFilter === 'completed')  list = list.filter(s => s.status === 'Completed');
  if (studentFilter === 'followup')   list = list.filter(s => s.followup);

  if (search) {
    list = list.filter(s =>
      s.name?.toLowerCase().includes(search) ||
      s.code?.toLowerCase().includes(search) ||
      s.program?.toLowerCase().includes(search) ||
      s.focus?.toLowerCase().includes(search)
    );
  }

  const el = document.getElementById('studentList');
  if (list.length === 0) {
    el.innerHTML = '<div class="empty">No students found</div>';
  } else {
    el.innerHTML = list.map(s => studentCardHTML(s)).join('');
  }
}

function studentCardHTML(s) {
  const initials = s.name ? s.name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase() : s.code?.slice(0,2) || '??';
  const sesCount = state.sessions.filter(x => x.studentId === s.id).length;
  const statusCls = s.status === 'Active' ? 'tag-active' : s.status === 'Monitoring' ? 'tag-monitor' : 'tag-complete';
  return `<div class="student-card" onclick="openStudent('${s.id}')">
    <div class="student-avatar">${initials}</div>
    <div class="student-info">
      <div class="student-code">${esc(s.code || '—')}</div>
      <div class="student-name">${esc(s.name || 'Student')}</div>
      <div class="student-tags">
        <span class="tag ${statusCls}">${s.status || 'Active'}</span>
        ${s.followup ? '<span class="tag tag-followup">Follow-Up</span>' : ''}
        ${s.program ? `<span class="tag tag-program">${esc(s.program.split(',')[0].trim())}</span>` : ''}
      </div>
    </div>
    <div class="student-sessions">
      <strong>${sesCount}</strong>
      sessions
    </div>
  </div>`;
}

// ── STUDENT DETAIL ───────────────────────────────────────────
function openStudent(id) {
  const s = state.students.find(x => x.id === id);
  if (!s) return;

  const initials = s.name ? s.name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase() : s.code?.slice(0,2) || '??';
  const sessions  = state.sessions.filter(x => x.studentId === id);
  const goals     = state.goals.filter(x => x.studentId === id);
  const practices = state.practices.filter(x => x.studentId === id);
  const statusCls = s.status === 'Active' ? 'tag-active' : s.status === 'Monitoring' ? 'tag-monitor' : 'tag-complete';

  let html = `
    <div class="detail-header">
      <button class="back-btn" onclick="goBackFromDetail()">←</button>
      <div class="detail-avatar">${initials}</div>
      <div>
        <div class="detail-name">${esc(s.name || 'Student')}</div>
        <div class="detail-sub">${esc(s.code)} · ${esc(s.grade || '')}</div>
      </div>
    </div>

    <div class="info-grid">
      <div class="info-chip">
        <div class="info-chip-label">Status</div>
        <div class="info-chip-value"><span class="tag ${statusCls}">${s.status || 'Active'}</span></div>
      </div>
      <div class="info-chip">
        <div class="info-chip-label">Sessions</div>
        <div class="info-chip-value" style="font-family:'DM Serif Display',serif;font-size:18px">${sessions.length}</div>
      </div>
      <div class="info-chip" style="grid-column:1/-1">
        <div class="info-chip-label">Programs</div>
        <div class="info-chip-value">${esc(s.program || '—')}</div>
      </div>
      <div class="info-chip" style="grid-column:1/-1">
        <div class="info-chip-label">Main Focus</div>
        <div class="info-chip-value">${esc(s.focus || '—')}</div>
      </div>
      ${s.followup ? `<div class="info-chip" style="grid-column:1/-1;border-left:3px solid #EF4444">
        <div class="info-chip-label">Follow-Up</div>
        <div class="info-chip-value" style="color:#EF4444;font-weight:600">✓ Follow-up needed</div>
      </div>` : ''}
    </div>

    <div class="section-header">
      <div class="section-title">Sessions</div>
      <div class="section-count">${sessions.length}</div>
    </div>
    ${sessions.length === 0 ? '<div class="empty">No sessions yet</div>' :
      sessions.map(sess => `
        <div class="session-item">
          <div class="session-item-header">
            <span class="session-item-title">${esc(sess.title || 'Session')}</span>
            <span class="session-item-date">${sess.date || '—'}</span>
          </div>
          <div class="session-item-detail">Focus: ${esc(sess.focus || '—')} · ${esc(sess.intervention || '—')}</div>
          ${sess.reflection ? `<div class="session-item-detail" style="margin-top:4px;font-style:italic">"${esc(sess.reflection)}"</div>` : ''}
          ${sess.next ? `<div class="session-item-detail" style="margin-top:4px;color:#274C77">Next: ${esc(sess.next)}</div>` : ''}
        </div>`).join('')
    }

    <div class="section-header" style="margin-top:16px">
      <div class="section-title">Goals</div>
      <div class="section-count">${goals.length}</div>
    </div>
    ${goals.length === 0 ? '<div class="empty">No goals yet</div>' :
      goals.map(g => `
        <div class="goal-item">
          <div class="session-item-header">
            <span class="session-item-title">${esc(g.title || 'Goal')}</span>
            <span class="tag ${g.status==='Active'?'tag-active':'tag-monitor'}" style="font-size:10px">${g.status || 'Active'}</span>
          </div>
          <div class="session-item-detail">Type: ${esc(g.type || '—')} · Progress: ${esc(g.progress || '—')}</div>
          ${g.notes ? `<div class="session-item-detail" style="margin-top:4px">${esc(g.notes)}</div>` : ''}
        </div>`).join('')
    }

    <div class="section-header" style="margin-top:16px">
      <div class="section-title">Practices</div>
      <div class="section-count">${practices.length}</div>
    </div>
    ${practices.length === 0 ? '<div class="empty">No practices yet</div>' :
      practices.map(p => `
        <div class="practice-item">
          <div class="session-item-header">
            <span class="session-item-title">${esc(p.name || 'Practice')}</span>
            <span class="session-item-date">${esc(p.frequency || '—')}</span>
          </div>
          <div class="session-item-detail">Type: ${esc(p.type || '—')} · ${esc(p.status || 'Assigned')}</div>
          ${p.notes ? `<div class="session-item-detail" style="margin-top:4px;font-style:italic">${esc(p.notes)}</div>` : ''}
        </div>`).join('')
    }

    <div style="height:20px"></div>
  `;

  document.getElementById('detailContent').innerHTML = html;
  showPage('detail', null);
}

function goBackFromDetail() {
  // Go back to students list
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  const studentsTab = document.querySelectorAll('.nav-tab')[1];
  if (studentsTab) studentsTab.classList.add('active');
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-students').classList.add('active');
}

// ── REMINDERS ────────────────────────────────────────────────
let remTab = 'pending';

function setRemTab(tab, el) {
  remTab = tab;
  document.querySelectorAll('#page-reminders .filter-pill').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  renderReminders();
}

function renderReminders() {
  const today = new Date().toISOString().split('T')[0];
  let list = [...state.reminders];

  if (remTab === 'pending') list = list.filter(r => !r.done);
  if (remTab === 'today')   list = list.filter(r => !r.done && r.dueDate === today);
  if (remTab === 'done')    list = list.filter(r => r.done);

  const el = document.getElementById('remindersList');
  if (list.length === 0) {
    el.innerHTML = '<div class="empty">Nothing here ✓</div>';
    return;
  }

  const priColors = { High:'#EF4444', Medium:'#F59E0B', Low:'#6366F1' };

  el.innerHTML = list.map(r => {
    const due = r.dueDate ? formatDue(r.dueDate) : '';
    return `<div class="reminder-item ${r.done ? 'rem-done' : ''}">
      <div class="rem-dot" style="background:${priColors[r.priority]||'#9CA3AF'}"></div>
      <div style="flex:1">
        <div class="rem-text">${esc(r.text)}</div>
        <div class="rem-meta">
          ${r.type ? `<span style="font-weight:600">${r.type}</span>` : ''}
          ${r.student ? ` · ${r.student}` : ''}
          ${due ? ` · ${due}` : ''}
        </div>
      </div>
    </div>`;
  }).join('');
}

function formatDue(iso) {
  const d = new Date(iso + 'T00:00:00');
  const today = new Date(); today.setHours(0,0,0,0);
  const diff = Math.round((d - today) / 86400000);
  if (diff === 0) return 'Today';
  if (diff === 1) return 'Tomorrow';
  if (diff === -1) return 'Yesterday';
  if (diff < -1) return `${Math.abs(diff)}d overdue`;
  if (diff < 7) return `In ${diff} days`;
  return d.toLocaleDateString('en-US', { month:'short', day:'numeric' });
}

// ── NAVIGATION ───────────────────────────────────────────────
function showPage(name, tabEl) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  if (tabEl) {
    document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
    tabEl.classList.add('active');
  }
  window.scrollTo(0, 0);
}

// ── CONNECTION BANNER ────────────────────────────────────────
function setConn(state, title, sub) {
  const dot = document.getElementById('connDot');
  const t   = document.getElementById('connTitle');
  const s   = document.getElementById('connSub');
  dot.className = 'conn-dot ' + state;
  t.textContent = title;
  s.textContent = sub;
}

// ── UTILITY ──────────────────────────────────────────────────
function esc(str) {
  return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
